plugins {
    id 'java'
    id 'maven-publish'
}

group = "SuenoDev.Sueno"
version = "1.0"

sourceCompatibility = 8
targetCompatibility = 8

ext {
    sdkRoot = System.getenv("ANDROID_HOME") ?: System.getenv("ANDROID_SDK_ROOT") ?: project.findProperty("androidSdkRoot")
    mindustryVersion = 'v146'
    arcVersion = 'v146'
}

sourceSets.main {
    java.srcDirs = ['src', 'gen']
    resources.srcDirs = ['res']
}

repositories {
    mavenLocal()
    mavenCentral()
    maven { url "https://www.jitpack.io" }
    maven { url "https://raw.githubusercontent.com/Zelaux/MindustryRepo/master/repository" }
    maven { url "https://raw.githubusercontent.com/Zelaux/Repo/master/repository" }
}

dependencies {
    compileOnly "com.github.Anuken.Arc:arc-core:$arcVersion"
    compileOnly "com.github.Anuken.Mindustry:core:$mindustryVersion"

    compileOnly "com.github.Zelaux.MindustryModCore:annotations:repo-test7"
    annotationProcessor "com.github.Zelaux.MindustryModCore:annotations:repo-test7"

    annotationProcessor "com.github.Anuken:jabel:93fde537c7"
    compileOnly "com.github.Anuken:jabel:93fde537c7"

    compileOnly project(":annotations")
    annotationProcessor project(":annotations")
}

configurations.all {
    resolutionStrategy.eachDependency { details ->
        if (details.requested.group == 'com.github.Anuken.Arc') {
            details.useVersion arcVersion
        }
    }
}

task bumpVersion {
    outputs.upToDateWhen { false }

    doLast {
        def versionFile = file("res/data/builder")
        if (versionFile.exists()) {
            try {
                String content = versionFile.text.trim()
                String[] parts = content.split('/')
                if (parts.length == 2) {
                    int ver = Integer.parseInt(parts[1]) + 1
                    versionFile.text = "${parts[0]}/$ver"
                    println "[:Build:] Version bumped to: ${parts[0]}/$ver"
                }
            } catch (Exception e) {
                println "[:Build:] Failed to parse builder file."
            }
        } else {
            versionFile.parentFile.mkdirs()
            versionFile.text = "durmiendo/1"
        }
    }
}
processResources.dependsOn bumpVersion

tasks.withType(JavaCompile) {
    options.encoding = "UTF-8"
    options.compilerArgs += ["-Xlint:deprecation"]
    options.compilerArgs += ["-h", file("jni/include")]
    options.generatedSourceOutputDirectory.set(file("gen"))
    options.release.set(8)

    doFirst {
        delete file("gen")
        file("gen").mkdirs()
    }

    options.fork = true
    options.forkOptions.jvmArgs += [
            "--add-opens=jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED",
            "--add-opens=jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED",
            "--add-opens=jdk.compiler/com.sun.tools.javac.model=ALL-UNNAMED",
            "--add-opens=jdk.compiler/com.sun.tools.javac.processing=ALL-UNNAMED",
            "--add-opens=jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED",
            "--add-opens=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED",
            "--add-opens=jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED",
            "--add-opens=jdk.compiler/com.sun.tools.javac.comp=ALL-UNNAMED",
            "--add-opens=jdk.compiler/com.sun.tools.javac.main=ALL-UNNAMED",
            "--add-opens=jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED",
            "--add-opens=jdk.compiler/com.sun.tools.javac.jvm=ALL-UNNAMED",
            "--add-opens=java.base/sun.reflect.annotation=ALL-UNNAMED"
    ]
}

task jarAndroid(type: Jar) {
    dependsOn classes
    archiveFileName = "classes.jar"

    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    from sourceSets.main.output
    from(file("mod.json"))
    from(file("icon.png"))

    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}

task dex(type: Exec) {
    dependsOn jarAndroid

    def dexOutput = new File(buildDir, "libs/classes.dex")

    if (sdkRoot == null || !new File(sdkRoot).exists()) {
        enabled = false
        commandLine "echo", "Android SDK not found. Skipping Dex."
    } else {
        doFirst {
            dexOutput.parentFile.mkdirs()
        }

        def buildTools = new File(sdkRoot, "build-tools")
        if (!buildTools.exists()) throw new GradleException("Android Build Tools not found")

        def toolVersion = buildTools.listFiles().sort().last().name
        def d8Name = System.getProperty('os.name').toLowerCase().contains('win') ? 'd8.bat' : 'd8'
        def d8 = new File(buildTools, "$toolVersion/$d8Name")

        def platformsDir = new File(sdkRoot, "platforms")
        def latestPlatform = platformsDir.listFiles()?.sort()?.reverse()?.find { new File(it, "android.jar").exists() }
        if (latestPlatform == null) throw new GradleException("No android.jar found in SDK.")

        def androidJar = new File(latestPlatform, "android.jar")

        commandLine d8, "--min-api", "14", "--output", dexOutput.parent, "--lib", androidJar, jarAndroid.archiveFile.get()
    }
}

task compileNatives(type: Exec) {
    group = "build"
    description = "Compiles C++ sources using CMake"

    inputs.dir file("jni")
    outputs.file file("natives/libsueno-native.so")

    onlyIf { file("jni/CMakeLists.txt").exists() }

    doFirst {
        file("jni/build").mkdirs()
    }

    workingDir "jni/build"

    commandLine 'sh', '-c', 'cmake .. -DCMAKE_BUILD_TYPE=Release && make -j$(nproc) && cp libsueno-native.so ../../natives/'

    doLast {
        println "[:Natives:] C++ library compiled and copied to natives/"
    }
}

task dist(type: Jar) {
    dependsOn compileNatives
    dependsOn jarAndroid
    if (tasks.dex.enabled) dependsOn dex

    archiveFileName = "Sueno.jar"
    destinationDirectory = file("build/libs")

    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    if (tasks.dex.enabled && file("$buildDir/libs/classes.dex").exists()) {
        from(file("$buildDir/libs/classes.dex"))
    }

    from(zipTree(jarAndroid.archiveFile.get()))

    from(file("natives")) {
        into "natives"
    }
}

task install(type: Copy) {
    dependsOn dist

    if (project.hasProperty("modsPath")) {
        from dist.archiveFile
        into project.findProperty("modsPath")

        doLast {
            println "[:Install:] Mod copied to " + project.findProperty("modsPath")
        }
    } else {
        doFirst {
            println "[:Install:] 'modsPath' not set in gradle.properties. Skipping install."
        }
    }
}

task run(type: Exec) {
    dependsOn install

    if (project.hasProperty("gameJarPath")) {
        commandLine "java", "-jar", project.findProperty("gameJarPath")

        // args "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=5005"

    } else {
        doFirst {
            println "[:Run:] 'gameJarPath' not set in gradle.properties. Cannot run."
        }
    }
}