name: DiscordPub

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  buildJar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build mod jars
        run: |
          chmod +x gradlew
          ./gradlew install --stacktrace

      - name: Get Builder Info
        id: builder-info
        run: |
          # Читаем файл res/data/builder
          CONTENT=$(cat res/data/builder)
          # Разбиваем на имя и номер
          B_NAME=$(echo $CONTENT | cut -d'/' -f1)
          B_NUM=$(echo $CONTENT | cut -d'/' -f2)
          # Сохраняем в переменные шага
          echo "b_name=$B_NAME" >> $GITHUB_OUTPUT
          echo "b_num=$B_NUM" >> $GITHUB_OUTPUT

      - name: Get mod version
        id: get-version
        run: |
          VERSION=$(cat mod.json | jq -r '.version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename jar
        run: |
          mv artifacts/Sueno.jar artifacts/Sueno-${{ steps.get-version.outputs.version }}.${{ github.run_number }}.jar

      - name: Upload built jar file
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}
          path: artifacts/*.jar

      - name: Check for screenshot
        id: check-image
        run: |
          if [ -f ".screenshot/img.png" ]; then
            echo "image_url=https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/.screenshot/img.png" >> $GITHUB_OUTPUT
          else
            echo "image_url=" >> $GITHUB_OUTPUT
          fi

      - name: Discord Webhook Action
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          embed-title: "Сборка Sueno #${{ github.run_number }}"
          embed-description: |
            ### ${{ github.event.head_commit.message }}
            **Сборщик:** ${{ steps.builder-info.outputs.b_name }}
            **Номер компиляции:** ${{ steps.builder-info.outputs.b_num }}
          embed-color: 15386701
          embed-url: ${{ github.event.head_commit.url }}
          embed-image-url: ${{ steps.check-image.outputs.image_url }}
          embed-footer-text: "Версия мода: ${{ steps.get-version.outputs.version }} | Build ID: ${{ steps.builder-info.outputs.b_num }}"
          filename: artifacts/Sueno-${{ steps.get-version.outputs.version }}.${{ github.run_number }}.jar